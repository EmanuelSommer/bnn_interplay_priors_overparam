hydra:
  output_subdir: hydra_logs/posteriors_mfvi

model:
  name: tiny_resnet
  out_dim: 10
  activation: relu

seeds: [0, 1, 2]

data: 
  path: "./data/cifar10"
  source: "torchvision"
  data_type: "image"
  task: "class"
  normalize: true
  train_split: 0.75
  valid_split: 0.08334
  test_split: 0.16666

training:
  n_epochs: 300
  batch_size: 64
  learning_rate: 5e-4
  weight_decay: 0.0
  init_log_sds: -3.0
  temperature_scale: 1.0
  maximize: false
  max_iter: 10000000

evaluation:
  n_samples: 20

# Output settings
output:
  save_dir: "results/mfvi_cifar10"
  log_interval: 10